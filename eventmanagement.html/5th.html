<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>bookshow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-dark">
    <main>
        <section>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container-fluid">

                    <a class="mx-5 navbar-brand text-danger">bookmyshow</a>

                    <form class="d-flex ms-auto" role="search">
                        <input class="form-control me-2 text-center" type="search" placeholder="Search for movies,etc.."
                            aria-label="Search">
                        <button class="btn btn-outline-light me-2" type="submit">Search</button>
                        <button class="btn btn-outline-light" type="submit">
                            <a class="nav-link active" href="index.html">Login</a>
                        </button>
                    </form>

                </div>
            </nav>
             <hr class="border-secondary mb-0 mt-0 bg-black">
        </section>
    </main>
    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body">

                        <h3 class="text-center mb-4">Login</h3>

                        <form>

                            <div class="mb-3">

                                <label class="form-label">Email</label>

                                <input type="email" class="form-control" placeholder="Enter email">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">Password</label>

                                <input type="password" class="form-control" placeholder="Enter password">

                            </div>

                            <div class="d-grid">

                                <button type="submit" class="btn btn-warning">
                                    Login
                                </button>

                            </div>

                        </form>

                        <p class="text-center mt-3">
                            Don't have an account? <a href="#">Register</a>
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
